name: Build and Release macOS Native App

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac-dmg:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Build macOS Native Bundle & Package DMG
        run: |
          chmod +x scripts/build-native-mac.sh
          ./scripts/build-native-mac.sh

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: ZCode.Account.Switcher.macOS.dmg
          path: dist/*.dmg

      - name: Release DMG on Tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
